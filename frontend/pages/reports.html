<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes | Avisos Ciudadanos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header>
    <h1>Avisos Ciudadanos</h1>
    <nav>
        <a href="users.html">Usuarios</a>
        <a href="notices.html">Avisos</a>
        <a href="followups.html">Seguimientos</a>
        <a href="reports.html">Reportes</a>
        <a href="../index.html" onclick="logout()">Salir</a>
    </nav>
</header>

<main>
    <section class="card">
        <h2>Reportes Generales</h2>

        <div class="report-actions">
            <button onclick="loadGeneralStatistics()">Cargar estadísticas</button>
            <button onclick="loadNoticesByType()">Cargar avisos por tipo</button>
        </div>

        <div id="messageBox" class="message hidden"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Total</span>
                <strong id="totalNotices">0</strong>
            </div>

            <div class="stat-card">
                <span>Pendientes</span>
                <strong id="pendingNotices">0</strong>
            </div>

            <div class="stat-card">
                <span>En proceso</span>
                <strong id="inProgressNotices">0</strong>
            </div>

            <div class="stat-card">
                <span>Resueltos</span>
                <strong id="resolvedNotices">0</strong>
            </div>
        </div>
    </section>

    <section class="card">
        <h2>Avisos por Tipo</h2>

        <table>
            <thead>
            <tr>
                <th>Tipo de daño</th>
                <th>Cantidad</th>
            </tr>
            </thead>
            <tbody id="typesReportTable"></tbody>
        </table>
    </section>

    <section class="card">
        <h2>Seguimientos por Aviso</h2>

        <div class="search-bar">
            <select id="codigoAvisoReporte">
                <option value="">Seleccione un aviso</option>
            </select>
            <button onclick="loadFollowUpsReport()">Ver reporte</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>Código</th>
                <th>Aviso</th>
                <th>Estado</th>
                <th>Observación</th>
                <th>Fecha</th>
                <th>Responsable</th>
            </tr>
            </thead>
            <tbody id="followUpsReportTable"></tbody>
        </table>
    </section>
</main>

<script src="../js/app.js"></script>
<script src="../js/reports.js"></script>
</body>
</html>
