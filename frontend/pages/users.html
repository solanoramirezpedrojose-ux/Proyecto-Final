<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios | Avisos Ciudadanos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header>
    <h1>Avisos Ciudadanos</h1>
    <nav>
        <a href="users.html">Usuarios</a>
        <a href="notices.html">Avisos</a>
        <a href="followups.html">Seguimientos</a>
        <a href="reports.html">Reportes</a>
        <a href="../index.html" onclick="logout()">Salir</a>
    </nav>
</header>

<main>
    <section class="card">
        <h2>Gestión de Usuarios</h2>

        <form id="userForm" class="form-grid">
            <div>
                <label>Cédula</label>
                <input type="text" id="cedula" required>
            </div>

            <div>
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>

            <div>
                <label>Correo</label>
                <input type="email" id="correo" required>
            </div>

            <div>
                <label>Contraseña</label>
                <input type="password" id="contrasena" required>
            </div>

            <div>
                <label>Rol</label>
                <select id="rol" required>
                    <option value="">Seleccione un rol</option>
                    <option value="administrador">Administrador</option>
                    <option value="ciudadano">Ciudadano</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit">Guardar</button>
                <button type="button" class="secondary" onclick="clearUserForm()">Limpiar</button>
            </div>
        </form>

        <div id="messageBox" class="message hidden"></div>
    </section>

    <section class="card">
        <h2>Buscar Usuario</h2>

        <div class="search-bar">
            <input type="text" id="searchCedula" placeholder="Digite la cédula">
            <button onclick="searchUser()">Buscar</button>
            <button class="secondary" onclick="loadUsers()">Ver todos</button>
        </div>
    </section>

    <section class="card">
        <h2>Lista de Usuarios</h2>

        <table>
            <thead>
            <tr>
                <th>Cédula</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </section>
</main>

<script src="../js/app.js"></script>
<script src="../js/users.js"></script>
</body>
</html>
