<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión | Avisos Ciudadanos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <div class="login-header">
            <h1>Avisos Ciudadanos</h1>
            <p>
                Sistema web para registrar avisos ciudadanos, dar seguimiento
                a los reportes y consultar estadísticas de atención.
            </p>
        </div>

        <form id="loginForm">
            <label for="loginCorreo">Correo electrónico</label>
            <input 
                type="email" 
                id="loginCorreo" 
                placeholder="Digite su correo"
                required
            >

            <label for="loginContrasena">Contraseña</label>
            <input 
                type="password" 
                id="loginContrasena" 
                placeholder="Digite su contraseña"
                required
            >

            <button type="submit">Ingresar al sistema</button>
        </form>

        <div id="messageBox" class="message hidden"></div>

        <div class="login-footer">
            <span>Proyecto Desarrollo de Software III</span>
        </div>

    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
